name: Validate use links in README.md

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/validate-use-links.yml"
      - "scripts/validate-use-links.ts"

jobs:
  validate-urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Validate use links in README.md
        run: pnpm tsx scripts/validate-use-links.ts
